<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExpenseIQ — {% if mode == 'login' %}Sign In{% else %}Create Account{% endif %}</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: rgba(255,255,255,0.08);
    --text: #f0f0f5;
    --muted: #8888a0;
    --accent: #7c6dfa;
    --accent2: #fa6d8e;
    --success: #4ade80;
    --warning: #facc15;
    --danger: #f87171;
    --radius: 16px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .bg-grid {
    position: fixed; inset: 0; z-index: 0;
    background-image:
      linear-gradient(rgba(124,109,250,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,109,250,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .bg-glow {
    position: fixed; z-index: 0;
    width: 600px; height: 600px; border-radius: 50%;
    filter: blur(120px); pointer-events: none;
  }
  .glow-1 { background: rgba(124,109,250,0.15); top: -200px; left: -200px; }
  .glow-2 { background: rgba(250,109,142,0.1); bottom: -200px; right: -200px; }
  .auth-container {
    position: relative; z-index: 1;
    width: 100%; max-width: 460px; padding: 20px;
  }
  .logo {
    text-align: center; margin-bottom: 40px;
  }
  .logo h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2rem; font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo p { color: var(--muted); font-size: 0.9rem; margin-top: 4px; }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 40px;
    backdrop-filter: blur(20px);
  }
  .tab-row {
    display: flex; gap: 4px; margin-bottom: 32px;
    background: rgba(255,255,255,0.04); border-radius: 12px; padding: 4px;
  }
  .tab-btn {
    flex: 1; padding: 10px; border: none; background: transparent;
    color: var(--muted); cursor: pointer; border-radius: 9px;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 500;
    transition: all 0.2s;
  }
  .tab-btn.active { background: var(--accent); color: white; }
  .form-group { margin-bottom: 20px; }
  label { display: block; font-size: 0.85rem; color: var(--muted); margin-bottom: 8px; font-weight: 500; }
  input {
    width: 100%; padding: 12px 16px;
    background: rgba(255,255,255,0.05);
    border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
    outline: none; transition: border 0.2s;
  }
  input:focus { border-color: var(--accent); background: rgba(124,109,250,0.08); }
  .btn-primary {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--accent), #9b8dff);
    border: none; border-radius: 10px; color: white;
    font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px;
    margin-top: 8px;
  }
  .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(124,109,250,0.4); }
  .btn-primary:active { transform: translateY(0); }
  .alert {
    padding: 12px 16px; border-radius: 10px; font-size: 0.9rem; margin-bottom: 20px;
    display: none;
  }
  .alert.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--danger); }
  .alert.success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: var(--success); }
  .divider { text-align: center; margin: 20px 0; color: var(--muted); font-size: 0.85rem; position: relative; }
  .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: var(--border); }
  .divider::before { left: 0; } .divider::after { right: 0; }
  .demo-hint {
    background: rgba(124,109,250,0.1); border: 1px solid rgba(124,109,250,0.2);
    border-radius: 10px; padding: 12px 16px; font-size: 0.85rem;
    color: var(--muted); margin-top: 20px; text-align: center;
  }
  .demo-hint strong { color: var(--accent); }
  .loading { display: none; }
  .btn-primary.loading-state .text { display: none; }
  .btn-primary.loading-state .loading { display: inline; }
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow glow-1"></div>
<div class="bg-glow glow-2"></div>
<div class="auth-container">
  <div class="logo">
    <h1>ExpenseIQ</h1>
    <p>Smart money management powered by AI</p>
  </div>
  <div class="card">
    <div class="tab-row">
      <button class="tab-btn {% if mode == 'login' %}active{% endif %}" onclick="switchTab('login')">Sign In</button>
      <button class="tab-btn {% if mode == 'register' %}active{% endif %}" onclick="switchTab('register')">Create Account</button>
    </div>
    <div id="alert" class="alert"></div>

    <!-- Login Form -->
    <div id="login-form" {% if mode != 'login' %}style="display:none"{% endif %}>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="login-btn" onclick="doLogin()">
        <span class="text">Sign In →</span>
        <span class="loading">Signing in...</span>
      </button>
      <div class="demo-hint">
        Demo account: <strong>demo@example.com</strong> / <strong>demo1234</strong>
      </div>
    </div>

    <!-- Register Form -->
    <div id="register-form" {% if mode != 'register' %}style="display:none"{% endif %}>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="yourname" autocomplete="username">
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" id="reg-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="Min 6 characters" autocomplete="new-password">
      </div>
      <button class="btn-primary" id="register-btn" onclick="doRegister()">
        <span class="text">Create Account →</span>
        <span class="loading">Creating account...</span>
      </button>
    </div>
  </div>
</div>

<script>
function switchTab(tab) {
  document.getElementById('login-form').style.display = tab === 'login' ? '' : 'none';
  document.getElementById('register-form').style.display = tab === 'register' ? '' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
  });
  hideAlert();
}

function showAlert(msg, type='error') {
  const a = document.getElementById('alert');
  a.textContent = msg; a.className = `alert ${type}`; a.style.display = 'block';
}
function hideAlert() { document.getElementById('alert').style.display = 'none'; }

async function doLogin() {
  const btn = document.getElementById('login-btn');
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  if (!email || !password) return showAlert('Please fill in all fields');
  btn.classList.add('loading-state');
  try {
    const res = await fetch('/auth/login', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({email, password})
    });
    const data = await res.json();
    if (res.ok) { showAlert('Welcome back! Redirecting...', 'success'); setTimeout(() => location.href = '/dashboard', 800); }
    else showAlert(data.error || 'Login failed');
  } catch(e) { showAlert('Network error. Please try again.'); }
  finally { btn.classList.remove('loading-state'); }
}

async function doRegister() {
  const btn = document.getElementById('register-btn');
  const username = document.getElementById('reg-username').value.trim();
  const email = document.getElementById('reg-email').value.trim();
  const password = document.getElementById('reg-password').value;
  if (!username || !email || !password) return showAlert('Please fill in all fields');
  if (password.length < 6) return showAlert('Password must be at least 6 characters');
  btn.classList.add('loading-state');
  try {
    const res = await fetch('/auth/register', {
      method: 'POST', headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, email, password})
    });
    const data = await res.json();
    if (res.ok) { showAlert('Account created! Redirecting...', 'success'); setTimeout(() => location.href = '/dashboard', 800); }
    else showAlert(data.error || 'Registration failed');
  } catch(e) { showAlert('Network error. Please try again.'); }
  finally { btn.classList.remove('loading-state'); }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const lf = document.getElementById('login-form');
    if (lf.style.display !== 'none') doLogin();
    else doRegister();
  }
});
</script>
</body>
</html>
